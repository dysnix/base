[package]
name = "base-consensus"
description = "Base Consensus Binary"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[[bin]]
name = "base-consensus"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
# workspace
base-cli-utils.workspace = true
base-client-cli.workspace = true

# alloy
alloy-chains.workspace = true
alloy-provider.workspace = true
alloy-primitives.workspace = true
base-common-network.workspace = true

# consensus
base-common-chains.workspace = true
base-common-genesis.workspace = true
base-consensus-peers.workspace = true
base-consensus-disc = { workspace = true, features = ["metrics"] }
base-consensus-node = { workspace = true, features = ["metrics"] }
base-consensus-providers = { workspace = true, features = ["metrics"] }

# cli
strum.workspace = true
clap = { workspace = true, features = ["env"] }

# networking
discv5.workspace = true
libp2p.workspace = true

# tracing
tracing = { workspace = true, features = ["std"] }

# metrics
metrics.workspace = true

# misc
url.workspace = true
dirs.workspace = true
eyre.workspace = true
serde.workspace = true
tokio.workspace = true
serde_json.workspace = true

[dev-dependencies]
rstest.workspace = true
