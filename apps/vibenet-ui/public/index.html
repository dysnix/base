<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>base vibenet</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-text" id="title">base vibenet</span>
    </a>
    <nav class="site-nav">
      <a href="/">Home</a>
      <a id="faucet-nav" href="#" target="_blank" rel="noopener">Faucet &#x2197;</a>
      <a id="explorer-nav" href="#" target="_blank" rel="noopener">Explorer &#x2197;</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <p class="subtitle" id="subtitle"></p>
    </section>

    <section>
      <h2>Features</h2>
      <div id="features" class="features-grid"></div>
    </section>

    <section>
      <h2>Connect</h2>
      <div class="chain-card">
        <div class="chain-row">
          <span class="chain-label">Chain ID</span>
          <button type="button" class="chain-value copyable" data-copy-target="chain-id">
            <code id="chain-id">84538453</code>
            <span class="copy-hint" aria-hidden="true">Click to copy</span>
          </button>
        </div>
        <div class="chain-row">
          <span class="chain-label">RPC URL</span>
          <button type="button" class="chain-value copyable" data-copy-target="rpc-display">
            <code id="rpc-display" class="truncate">...</code>
            <span class="copy-hint" aria-hidden="true">Click to copy</span>
          </button>
        </div>
        <div class="chain-row">
          <span class="chain-label">Explorer</span>
          <a id="explorer-link" class="chain-value" href="#" target="_blank" rel="noopener">...</a>
        </div>
        <p class="notice small">Public RPC access is IP rate limited.</p>
        <div class="chain-actions">
          <button id="add-to-wallet" type="button">Add to wallet</button>
        </div>
        <p id="wallet-status" class="muted small"></p>
      </div>
    </section>

    <section>
      <h2>Deployed Contracts</h2>
      <div id="contracts-list" class="contracts-list">
        <p class="muted" style="padding: 0.75rem 1rem; margin: 0;">loading...</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span>branch <code id="branch">unknown</code></span>
    <span>commit <code id="commit">unknown</code></span>
    <span class="footer-spacer"></span>
    <a href="https://base.org" target="_blank" rel="noopener">base.org</a>
  </footer>

  <script type="module" src="/app.js"></script>
</body>
</html>
