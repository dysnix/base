name: Build Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to build and publish'
        required: true
        type: string
      is_final:
        description: 'Whether this is a final release (creates GitHub release + uploads binaries)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  RELEASE_BINS: |
    base-reth-node
    basectl
    base-consensus

permissions:
  contents: write
  packages: write

jobs:
  # Build native binaries for release artifacts
  build-binaries:
    strategy:
      matrix:
        target:
          - triple: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            os: linux
          - triple: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            os: linux
          - triple: aarch64-apple-darwin
            runner: macos-14
            os: macos

    runs-on: ${{ matrix.target.runner }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        if: matrix.target.os == 'linux'
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 1

      - name: Install system dependencies (Linux)
        if: matrix.target.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev pkg-config

      - name: Install mold linker (Linux)
        if: matrix.target.os == 'linux'
        uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1

      - name: Install lld linker (macOS)
        if: matrix.target.os == 'macos'
        run: |
          # llvm@15 is pre-installed on GH runners and includes ld64.lld.
          # Create a symlink so .cargo/config.toml's /opt/homebrew/opt/lld/ path resolves.
          LLD_BIN="$(brew --prefix llvm@15)/bin/ld64.lld"
          if [ -x "$LLD_BIN" ]; then
            sudo mkdir -p /opt/homebrew/opt/lld/bin
            sudo ln -sf "$LLD_BIN" /opt/homebrew/opt/lld/bin/ld64.lld
          else
            brew install lld
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4305c38b25d97ef35a8ad1f985ccf2d2242004f2 # stable

      - name: Build binaries
        run: |
          cargo_args=()
          while IFS= read -r bin; do
            [[ -n "$bin" ]] || continue
            cargo_args+=(--bin "$bin")
          done <<< "${RELEASE_BINS}"
          cargo build --locked --profile maxperf "${cargo_args[@]}"

      - name: Package binaries
        run: |
          TAG="${{ inputs.tag }}"
          TARGET="${{ matrix.target.triple }}"
          while IFS= read -r bin; do
            [[ -n "$bin" ]] || continue
            ARCHIVE="${bin}-${TAG}-${TARGET}.tar.gz"
            tar -czf "$ARCHIVE" -C target/maxperf "$bin"
            if command -v sha256sum &>/dev/null; then
              sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
            else
              shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
            fi
          done <<< "${RELEASE_BINS}"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binaries-${{ matrix.target.triple }}
          path: |
            *.tar.gz
            *.tar.gz.sha256
          if-no-files-found: error
          retention-days: 1

  # Build multi-arch Docker images for all working bake targets.
  # NOTE: audit-archiver is intentionally not built here even though the
  # bake target exists. Its `cargo build --package audit-archiver`
  # currently fails and there's no existing CI exercising it; can be
  # added once the source build is fixed.
  build-and-push:
    strategy:
      fail-fast: false
      matrix:
        service:
          # Image name preserved for back-compat with the existing client image stream.
          - { target: client,          image: node-reth-dev }
          - { target: consensus,       image: consensus-dev }
          - { target: builder,         image: builder-dev }
          - { target: batcher,         image: batcher-dev }
          - { target: proposer,        image: proposer-dev }
          - { target: websocket-proxy, image: websocket-proxy-dev }
          - { target: ingress-rpc,     image: ingress-rpc-dev }
        settings:
          - arch: linux/amd64
            runs-on: ubuntu-24.04
          - arch: linux/arm64
            runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.settings.runs-on }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Prepare
        run: |
          platform="${{ matrix.settings.arch }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          echo "REGISTRY_IMAGE=${{ env.REGISTRY }}/${{ matrix.service.image }}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 1

      - name: Prepare image labels
        id: image-labels
        run: |
          echo "source=https://github.com/${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "revision=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "version=${{ inputs.tag }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          TARGET: ${{ matrix.service.target }}
        run: |
          docker buildx bake -f etc/docker/docker-bake.hcl "$TARGET" \
            --set "${TARGET}.tags=${REGISTRY_IMAGE}" \
            --set "${TARGET}.platform=${{ matrix.settings.arch }}" \
            --set "${TARGET}.output=type=image,push-by-digest=true,name-canonical=true,push=true" \
            --set "${TARGET}.cache-to=type=registry,ref=${REGISTRY_IMAGE}:cache-${PLATFORM_PAIR},mode=max" \
            --set "${TARGET}.labels.org.opencontainers.image.source=${{ steps.image-labels.outputs.source }}" \
            --set "${TARGET}.labels.org.opencontainers.image.revision=${{ steps.image-labels.outputs.revision }}" \
            --set "${TARGET}.labels.org.opencontainers.image.created=${{ steps.image-labels.outputs.created }}" \
            --set "${TARGET}.labels.org.opencontainers.image.version=${{ steps.image-labels.outputs.version }}" \
            --metadata-file "${{ runner.temp }}/${TARGET}-metadata.json"

      - name: Export digest
        env:
          TARGET: ${{ matrix.service.target }}
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="$(jq -er ".\"${TARGET}\".\"containerimage.digest\"" "${{ runner.temp }}/${TARGET}-metadata.json")"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digests-${{ matrix.service.target }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge per-arch digests into a multi-arch manifest, one job per service.
  publish-images:
    needs: build-and-push
    strategy:
      fail-fast: false
      matrix:
        service:
          - { target: client,          image: node-reth-dev }
          - { target: consensus,       image: consensus-dev }
          - { target: builder,         image: builder-dev }
          - { target: batcher,         image: batcher-dev }
          - { target: proposer,        image: proposer-dev }
          - { target: websocket-proxy, image: websocket-proxy-dev }
          - { target: ingress-rpc,     image: ingress-rpc-dev }
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Set REGISTRY_IMAGE
        run: echo "REGISTRY_IMAGE=${{ env.REGISTRY }}/${{ matrix.service.image }}" >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.service.target }}-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Determine Docker tags
        id: tags
        run: |
          TAG="${{ inputs.tag }}"
          if [[ "$TAG" =~ -rc\. ]]; then
            echo "docker_tags=${REGISTRY_IMAGE}:${TAG}" >> $GITHUB_OUTPUT
          else
            VERSION="${TAG#v}"
            IFS='.' read -r major minor patch <<< "$VERSION"
            echo "docker_tags=${REGISTRY_IMAGE}:${TAG},${REGISTRY_IMAGE}:${major}.${minor},${REGISTRY_IMAGE}:${major},${REGISTRY_IMAGE}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          shopt -s nullglob
          DIGESTS=(*)
          if [[ ${#DIGESTS[@]} -eq 0 ]]; then
            echo "::error::No digests found for ${{ matrix.service.target }} — build-and-push may have failed"
            exit 1
          fi

          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.docker_tags }}"
          TAG_ARGS=""
          for tag in "${TAGS[@]}"; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done

          docker buildx imagetools create $TAG_ARGS \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " "${DIGESTS[@]}")

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${REGISTRY_IMAGE}:${{ inputs.tag }}"

  # Final-release-only steps: GH release + binary upload + summary.
  # Runs once, after both image and binary builds finish.
  release:
    needs: [publish-images, build-binaries]
    if: inputs.is_final
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "GitHub Release $TAG already exists, skipping creation"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes --draft
          fi

      - name: Download binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: ${{ runner.temp }}/binaries
          pattern: binaries-*
          merge-multiple: true

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          gh release upload "$TAG" ${{ runner.temp }}/binaries/*.tar.gz ${{ runner.temp }}/binaries/*.tar.gz.sha256

      - name: Summary
        run: |
          TAG="${{ inputs.tag }}"
          {
            echo "## Release Published"
            echo
            echo "**Tag**: \`$TAG\`"
            echo "**Type**: Final Release"
            echo
            echo "### Docker Images"
            echo
            echo "\`\`\`bash"
            for img in node-reth-dev consensus-dev builder-dev batcher-dev proposer-dev websocket-proxy-dev ingress-rpc-dev; do
              echo "docker pull ${{ env.REGISTRY }}/${img}:${TAG}"
            done
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # RC-only summary path
  rc-summary:
    needs: publish-images
    if: ${{ !inputs.is_final }}
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          TAG="${{ inputs.tag }}"
          {
            echo "## Release Published"
            echo
            echo "**Tag**: \`$TAG\`"
            echo "**Type**: Release Candidate"
            echo
            echo "### Docker Images"
            echo
            echo "\`\`\`bash"
            for img in node-reth-dev consensus-dev builder-dev batcher-dev proposer-dev websocket-proxy-dev ingress-rpc-dev; do
              echo "docker pull ${{ env.REGISTRY }}/${img}:${TAG}"
            done
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
